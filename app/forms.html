        <section class="container my-5">
            <div class="row g-4 align-items-start">
                <!-- Registro -->
                <div class="col-lg-8">
                    <div class="card border-0 shadow rounded-4">
                        <div class="card-header bg-primary text-white rounded-top-4 py-3">
                            <h5 class="mb-0 text-center">
                                <i class="bi bi-person-plus-fill me-2"></i>
                                Usuario de Personas
                            </h5>
                        </div>
                        <div class="card-body p-4">
                            <form>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Nombres</label>
                                        <input type="text" class="form-control" placeholder="Ingrese los nombres">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Apellidos</label>
                                        <input type="text" class="form-control" placeholder="Ingrese los apellidos">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Correo</label>
                                        <input type="email" class="form-control" placeholder="correo@ejemplo.com">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Teléfono</label>
                                        <input type="tel" class="form-control" placeholder="3001234567">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label">Edad</label>
                                        <input type="number" class="form-control" placeholder="19">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="genero" class="form-label">Género</label>
                                        <select id="genero" class="form-select">
                                            <option>Seleccione</option>
                                            <option>Femenino</option>
                                            <option>Masculino</option>
                                            <option>Otro</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="ciudad" class="form-label">Ciudad</label>
                                        <select id="ciudad" class="form-select">
                                            <option>Seleccione</option>
                                            <option>Medellín</option>
                                            <option>Bogotá</option>
                                            <option>Cali</option>
                                            <option>Barranquilla</option>
                                        </select>
                                    </div>
                                    <div class="col-12 mb-4">
                                        <label class="form-label">Observaciones</label>
                                        <input type="str" class="form-control" placeholder="Amo tu trabajo">

                                        </textarea>
                                    </div>
                                    <div class="col-12 text-center">
                                        <button class="btn btn-primary rounded-pill px-5 py-2">
                                            <i class="bi bi-check-circle me-2"></i>
                                            Registrar Persona
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
                <!-- Login -->
                <div class="col-lg-4">
                    <div class="card border-0 shadow rounded-4 sticky-top" style="top:100px;">
                        <div class="card-header bg-dark text-white rounded-top-4 py-3">
                            <h5 class="text-center mb-0">
                                <i class="bi bi-box-arrow-in-right me-2"></i>
                                Iniciar Sesión
                            </h5>
                        </div>
                        <div class="card-body p-4">
                            <div class="text-center mb-4">
                                <i class="bi bi-person-circle text-primary" style="font-size:70px;"></i>
                                <h5 class="mt-3">Bienvenido</h5>
                                <p class="text-muted small">
                                    Ingrese sus credenciales para acceder al sistema.
                                </p>
                            </div>
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">
                                        Correo Electrónico
                                    </label>
                                    <input type="email" class="form-control" placeholder="correo@ejemplo.com">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">
                                        Contraseña
                                    </label>
                                    <input type="password" class="form-control" placeholder="********">
                                </div>
                                <div class="form-check mb-4">
                                    <input class="form-check-input" type="checkbox" id="recordarme">
                                    <label class="form-check-label" for="recordarme">
                                        Recordarme
                                    </label>
                                </div>
                                <div class="d-grid">
                                    <button class="btn btn-primary rounded-pill">
                                        <i class="bi bi-door-open-fill me-2"></i>
                                        Iniciar Sesión

                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
